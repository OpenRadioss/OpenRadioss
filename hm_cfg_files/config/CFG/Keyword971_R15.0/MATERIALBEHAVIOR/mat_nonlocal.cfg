ATTRIBUTES(COMMON)
{
    
    KEYWORD_STR        = VALUE(STRING, "Solver Keyword");
    CommentEnumField   = VALUE(INT,  "User Comments");
    Num_Comments       = SIZE("No. of comment lines");
    Comments           = ARRAY[Num_Comments](STRING,  "Entity_Comments");
    LSD_TitleOpt       = VALUE(INT,  "Title");
    IO_FLAG            = VALUE(INT, "io flag");
    TITLE              = VALUE(STRING, "Title");
    TYPE               = VALUE(STRING, "");

    LSD_MAT_IDNL       = VALUE(MAT, "Nonlocal material input ID ");
    LSD_MAT_PID        = VALUE(COMPONENT, "Part ID for nonlocal material");
    LSD_MAT_P          = VALUE(FLOAT, "Exponent of weighting function P");
    LSD_MAT_Q          = VALUE(FLOAT, "Exponent of weighting function Q");
    LSD_MAT_L          = VALUE(FLOAT, "Characteristic length");
    LSD_MAT_NFREQ      = VALUE(INT, "Number of time steps between searching for integration points that lie in the neighborhood");
    LSD_MAT_NHV        = VALUE(INT, "Number of variables with nonlocal treatment of increments");
    LSD_MAT_NHVT       = VALUE(INT, "Number of variables with nonlocal treatment of total values");
    NHV_SIZE           = SIZE("Number of variables with nonlocal treatment of increments");
    NHVT_SIZE          = SIZE("Number of variables with nonlocal treatment of total values");
    NL_NHV             = ARRAY[NHV_SIZE](INT, "Identifies the history variable(s) for nonlocal treatment NHV");
    NL_NHVT            = ARRAY[NHVT_SIZE](INT, "Identifies the history variable(s) for nonlocal treatment NHVT");
    nrows              = SIZE("Number symmetry plane and normal vector");
    LSD_MAT_XC1        = ARRAY[nrows](FLOAT, "X coordinate Coordinate of point on symmetry plane 1");
    LSD_MAT_YC1        = ARRAY[nrows](FLOAT, "Y coordinate Coordinate of point on symmetry plane 1");
    LSD_MAT_ZC1        = ARRAY[nrows](FLOAT, "Z coordinate Coordinate of point on symmetry plane 1");
    LSD_MAT_XC2        = ARRAY[nrows](FLOAT, "X coordinate Coordinate of a point along the normal vector 2");
    LSD_MAT_YC2        = ARRAY[nrows](FLOAT, "Y coordinate Coordinate of a point along the normal vector 2");
    LSD_MAT_ZC2        = ARRAY[nrows](FLOAT, "Z coordinate Coordinate of a point along the normal vector 2");
}

SKEYWORDS_IDENTIFIER(COMMON)
{
    KEYWORD_STR                             = 9000;
    CommentEnumField                        = 3220;
    Comments                                = 3100;
    Num_Comments                            = 3101;
    LSD_TitleOpt                            = 90;
    TITLE                                   = -1;
    IO_FLAG                                 = -1;
    TYPE                                    = -1;
    LSD_MAT_IDNL                            = -1;
    LSD_MAT_PID                             = -1;
    LSD_MAT_P                               = -1;
    LSD_MAT_Q                               = -1;
    LSD_MAT_L                               = -1;
    LSD_MAT_NFREQ                           = -1;
    LSD_MAT_NHV                             = -1;
    LSD_MAT_NHVT                            = -1;
    LSD_MAT_XC1                             = -1;
    LSD_MAT_YC1                             = -1;
    LSD_MAT_ZC1                             = -1;
    LSD_MAT_XC2                             = -1;
    LSD_MAT_YC2                             = -1;
    LSD_MAT_ZC2                             = -1;
}


GUI(COMMON)
{
     ASSIGN(KEYWORD_STR, "*MAT_NONLOCAL");
     RADIO(CommentEnumField)
     {
         ADD(1, "Hide in Menu/Export");
         ADD(2, "Show in Menu/Export");
         ADD(3, "Do not export");
     }
     if(CommentEnumField == 2)
     {  
        SIZE(Num_Comments);
        ARRAY(Num_Comments,"")
        {
           SCALAR(Comments);
        }
     }     
    FLAG(LSD_TitleOpt);
    if(LSD_TitleOpt == TRUE)
    {
        ASSIGN(KEYWORD_STR, "_TITLE");
    }


    SCALAR(LSD_MAT_IDNL)       {DIMENSION="DIMENSIONLESS";}
    SCALAR(LSD_MAT_PID)        {DIMENSION="DIMENSIONLESS";}
    SCALAR(LSD_MAT_P)          {DIMENSION="DIMENSIONLESS";}
    SCALAR(LSD_MAT_Q)          {DIMENSION="DIMENSIONLESS";}
    SCALAR(LSD_MAT_L)          {DIMENSION="l";}
    SCALAR(LSD_MAT_NFREQ)      {DIMENSION="DIMENSIONLESS";}


    SIZE(NHV_SIZE);
    SIZE(NHVT_SIZE);

    ARRAY(NHV_SIZE, "")
    {
        SCALAR(NL_NHV);
    }

    ARRAY(NHVT_SIZE, "")
    {
        SCALAR(NL_NHVT);
    }
    
    
    SCALAR(LSD_MAT_NHV);
    SCALAR(LSD_MAT_NHVT);
    ASSIGN(LSD_MAT_NHV, NHV_SIZE);
    ASSIGN(LSD_MAT_NHVT, NHVT_SIZE);
    SIZE(nrows);
    ARRAY(nrows, "")
    {
        SCALAR(LSD_MAT_XC1)     {DIMENSION="l";}
        SCALAR(LSD_MAT_YC1)     {DIMENSION="l";}
        SCALAR(LSD_MAT_ZC1)     {DIMENSION="l";}
        SCALAR(LSD_MAT_XC2)     {DIMENSION="l";}
        SCALAR(LSD_MAT_YC2)     {DIMENSION="l";}
        SCALAR(LSD_MAT_ZC2)     {DIMENSION="l";}
    }
}



FORMAT(Keyword971_R15.0) 
{ 
    ASSIGN(IO_FLAG, 1, IMPORT);
    ASSIGN(IO_FLAG, 2, EXPORT);

    // Import
    if(IO_FLAG == 1)
    {
       HEADER("*MAT_NONLOCAL%6s",TYPE);
       ASSIGN(LSD_TitleOpt,_FIND(TYPE,"_TITLE"),IMPORT);
    }

    // Export
    if(IO_FLAG == 2 && LSD_TitleOpt == 0)
    {
        HEADER("*MAT_NONLOCAL");
    }
    else if(IO_FLAG == 2 && LSD_TitleOpt == 1)
    {
        HEADER("*MAT_NONLOCAL_TITLE");
    }


    if(IO_FLAG == 2 && LSD_TitleOpt == 1)
    {
        CARD("%-80s", TITLE);
    }

    ASSIGN(LSD_MAT_NHV, NHV_SIZE, EXPORT);
    ASSIGN(LSD_MAT_NHVT, NHVT_SIZE, EXPORT);

    // CARD 1
    //--------------------------
    COMMENT("$     IDNL       PID         P         Q         L     NFREQ       NHV      NHVT");
    CARD("%10d%10d%10lg%10lg%10lg%10d%10d%10d",LSD_MAT_IDNL, LSD_MAT_PID, LSD_MAT_P, LSD_MAT_Q, LSD_MAT_L ,LSD_MAT_NFREQ, LSD_MAT_NHV, LSD_MAT_NHVT);
    
    // CARD 2
    //--------------------------
    if(LSD_MAT_NHV > 0)
    {
        ASSIGN(NHV_SIZE,LSD_MAT_NHV, IMPORT);
        COMMENT("$   NL_NHV    NL_NHV    NL_NHV    NL_NHV    NL_NHV    NL_NHV    NL_NHV    NL_NHV");
        CELL_LIST(NHV_SIZE,"%10d", NL_NHV,80);
    }
    if(LSD_MAT_NHVT > 0)
    {
        ASSIGN(NHVT_SIZE,LSD_MAT_NHVT, IMPORT);
        COMMENT("$   NL_NHVT    NL_NHVT    NL_NHVT    NL_NHVT    NL_NHVT    NL_NHVT    NL_NHVT    NL_NHVT");
        CELL_LIST(NHVT_SIZE,"%10d", NL_NHVT,80);
    }
    if(LSD_MAT_NHVT == 0 && LSD_MAT_NHV == 0)
    {
        BLANK;
    }
   
    // CARD 3
    //--------------------------
    FREE_CARD_LIST(nrows)
    {
        CARD("%10lg%10lg%10lg%10lg%10lg%10lg",LSD_MAT_XC1, LSD_MAT_YC1, LSD_MAT_ZC1, LSD_MAT_XC2, LSD_MAT_YC2, LSD_MAT_ZC2);
    }
}
