// ADMAS - set inertia to nodes (type == 15)
// 

ATTRIBUTES {
    entityidsmax        = SIZE("Number of entities");
    entityids           = ARRAY[entityidsmax](NODE, "entity to which the mass is added");
    type                = VALUE(INT,   "Type");
    masses              = ARRAY[entityidsmax](FLOAT, "Added mass");
    ixx                 = ARRAY[entityidsmax](FLOAT, "xx component of inertia tensor");
    ixy                 = ARRAY[entityidsmax](FLOAT, "xy component of inertia tensor");
    ixz                 = ARRAY[entityidsmax](FLOAT, "xz component of inertia tensor");
    iyy                 = ARRAY[entityidsmax](FLOAT, "yy component of inertia tensor");
    iyz                 = ARRAY[entityidsmax](FLOAT, "yz component of inertia tensor");
    izz                 = ARRAY[entityidsmax](FLOAT, "zz component of inertia tensor");
}

FORMAT(radioss2612) {

    FREE_CARD_LIST(entityidsmax)
    {
        COMMENT("#               MASS   node_ID                           IXX                 IYY                 IZZ");
        CARD("%20lg%10d%10s%20lg%20lg%20lg",masses, entityids, _BLANK_, ixx, iyy, izz);
        COMMENT("#                                                        IXY                 IYZ                 IXZ");
        CARD("%10s%10s%10s%10s%20lg%20lg%20lg",_BLANK_, _BLANK_, _BLANK_, _BLANK_, ixy, iyz, ixz);
    }
}
