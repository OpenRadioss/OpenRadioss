ATTRIBUTES {

    TITLE               = VALUE (STRING, "Title");
  
    table_count         = SIZE("No. of operations");
    rsm_id_table        = ARRAY[table_count](INT, "RSM_id");
    option_table        = ARRAY[table_count](STRING,"Option");    
    face_x_minus        = ARRAY[table_count](INT,"Face_x-");
    face_x_plus         = ARRAY[table_count](INT,"Face_x+");    
    face_y_minus        = ARRAY[table_count](INT,"Face_y-");
    face_y_plus         = ARRAY[table_count](INT,"Face_y+");  
    face_z_minus        = ARRAY[table_count](INT,"Face_z-");
    face_z_plus         = ARRAY[table_count](INT,"Face_z+");        
}




// File format
FORMAT(radioss2612) 
{
    HEADER("/ALE/STRUCTURED_MESH/BCS/%d",_ID_);
    CARD("%-100s", TITLE);
    FREE_CARD_LIST(table_count)
    {
        COMMENT("#   RSM_id    Option   Face_x-   Face_x+   Face_y-   Face_y+   Face_z-   Face_z+");
        CARD("%10d%10s%10d%10d%10d%10d%10d%10d",rsm_id_table,option_table,face_x_minus,face_x_plus,face_y_minus,face_y_plus,face_z_minus,face_z_plus);   
    }    
}
