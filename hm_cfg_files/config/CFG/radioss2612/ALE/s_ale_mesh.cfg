ATTRIBUTES(COMMON)
{
    IO_FLAG                             = VALUE(INT, "Import/Export flag");
    _HMCOMMENTSFLAG                     = VALUE(INT, "Write HM Comments");
    _HWCOLOR                            = VALUE(INT, "Entity Color");
    TITLE                               = VALUE(STRING, "TITLE");

    PART_ID                             = VALUE(COMPONENT, "Part Identifier");
    NODE_OFFSET                         = VALUE(INT, "Nodal offset");
    ELEM_OFFSET                         = VALUE(INT, "Element offset");

    CONTROL_POINT_X                    = VALUE(INT,  "X control point");
    CONTROL_POINT_Y                    = VALUE(INT,  "Y control point");
    CONTROL_POINT_Z                    = VALUE(INT,  "Z control point");

    NODE_ID                             = VALUE(INT,  "Origin Node Identifier ");
    SKEW_ID                             = VALUE(INT, "Skewed Coordinate System Identifier ");
}

SKEYWORDS_IDENTIFIER(COMMON)
{
    IO_FLAG=-1;
    _HMCOMMENTSFLAG=-1;
    _HWCOLOR=-1;
}

GUI(COMMON)
{  
}

// File format
FORMAT(radioss2612) 
{
  ASSIGN(IO_FLAG, 0, EXPORT);
  ASSIGN(IO_FLAG, 1, IMPORT);
  HEADER("/ALE/STRUCTURED_MESH/MAIN/%d",_ID_);
  CARD("%-100s", TITLE);
  COMMENT("#  Part_ID  N_OFFSET  E_OFFSET C_POINT_X C_POINT_Y C_POINT_Z   NODE_ID   SKEW_ID");
  CARD("%10d%10d%10d%10d%10d%10d%10d%10d",PART_ID,NODE_OFFSET,ELEM_OFFSET,CONTROL_POINT_X,CONTROL_POINT_Y,CONTROL_POINT_Z,NODE_ID,SKEW_ID);
}
