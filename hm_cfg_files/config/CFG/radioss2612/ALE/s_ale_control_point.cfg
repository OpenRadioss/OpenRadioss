ATTRIBUTES {

    TITLE               = VALUE (STRING, "Title");
    icase               = VALUE (INT, "icase");
    blank1              = VALUE (INT, "Blank1");
    scale               = VALUE (FLOAT, "Scale");
    offset              = VALUE (FLOAT, "Offset");
    table_count         = SIZE("No. of nodes");   
    nodes_table_id      = ARRAY[table_count](INT,"Node_id");
    nodes_table_x       = ARRAY[table_count](FLOAT, "X-coord");
    nodes_table_ratio   = ARRAY[table_count](FLOAT, "Ratio");
}




// File format
FORMAT(radioss2612) 
{
    HEADER("/ALE/STRUCTURED_MESH/CONTROL_POINTS/%d",_ID_);
    CARD("%-100s", TITLE);
    COMMENT("#    Icase               Scale              Offset");
    CARD("%10d%10d%20lg%20lg",icase,blank1,scale,offset);
    COMMENT("#  Node_id   X-coord   Ratio");
    FREE_CARD_LIST(table_count)
    {
        CARD("%10d%20lg%20lg",nodes_table_id,nodes_table_x,nodes_table_ratio);
    }    
}
