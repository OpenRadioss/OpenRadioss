ATTRIBUTES {

    TITLE               = VALUE (STRING, "Title");
  
    table_count         = SIZE("No. of operations");
    rsm_id_table        = ARRAY[table_count](INT, "RSM_id");
    option_table        = ARRAY[table_count](STRING,"Option");    
    operation_table     = ARRAY[table_count](INT,"Operation");
    inout_table         = ARRAY[table_count](INT,"Inout");    
    int1_table            = ARRAY[table_count](INT, "int1");
    int2_table            = ARRAY[table_count](INT, "int2");
    e3_table            = ARRAY[table_count](FLOAT, "e3");
    e4_table            = ARRAY[table_count](FLOAT, "e4");        
}




// File format
FORMAT(radioss2612) 
{
    HEADER("/ALE/STRUCTURED_MESH/TRIM/%d",_ID_);
    CARD("%-100s", TITLE);
    FREE_CARD_LIST(table_count)
    {
        COMMENT("#   RSM_id    Option Operation     inout");
        CARD("%10d%10s%10d%10d",rsm_id_table,option_table,operation_table,inout_table);
        COMMENT("#                 int1                int2                e3                  e4");
        CARD("%10d%10d%20lg%20lg",int1_table,int2_table,e3_table,e4_table);        
    }    
}
