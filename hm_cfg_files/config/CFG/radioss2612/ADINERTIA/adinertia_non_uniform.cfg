ATTRIBUTES {
    entityidsmax        = SIZE("Number of entities");
    entityids           = ARRAY[entityidsmax](NODE, "entity to which the mass is added");
    type                = VALUE(INT,   "Type");
    masses              = ARRAY[entityidsmax](FLOAT, "Added mass");
    compxx              = ARRAY[entityidsmax](FLOAT, "xx component of inertia tensor");
    compxy              = ARRAY[entityidsmax](FLOAT, "xy component of inertia tensor");
    compxz              = ARRAY[entityidsmax](FLOAT, "xz component of inertia tensor");
    compyy              = ARRAY[entityidsmax](FLOAT, "yy component of inertia tensor");
    compyz              = ARRAY[entityidsmax](FLOAT, "yz component of inertia tensor");
    compzz              = ARRAY[entityidsmax](FLOAT, "zz component of inertia tensor");
}

FORMAT(radioss2612) {


    FREE_CARD_LIST(entityidsmax)
    {
        COMMENT("#  node_ID      type");
        CARD("%10d%10d",entityids,type);
        COMMENT("#                IXX                 IXY                 IXZ                 IYY                 IYZ");
        CARD("%20lg%20lg%20lg%20lg%20lg", compxx, compxy, compxz, compyy, compyz);
        COMMENT("#                IZZ                Mass");
        CARD("%20lg%20lg",compzz, masses);
    }
}
