ATTRIBUTES {
  // Single values
    IO_FLAG             = VALUE(INT, "Import/Export flag");
    _HMCOMMENTSFLAG     = VALUE(INT, "Write HM Comments");
    _HWCOLOR            = VALUE(INT, "Entity Color");
    TITLE               = VALUE(STRING, "TITLE");
    type                = VALUE(INT,   "Type");
    setid               = VALUE(SETS, "grnd_ID") { SUBTYPES = (/SETS/GRNOD/) ; }
    setid_type          = VALUE(STRING, "Type of multi object");

    // Tables
    masses              = VALUE(FLOAT, "Mass");
    compxx              = VALUE(FLOAT, "xx component of inertia tensor");
    compxy              = VALUE(FLOAT, "xy component of inertia tensor");
    compxz              = VALUE(FLOAT, "xz component of inertia tensor");
    compyy              = VALUE(FLOAT, "yy component of inertia tensor");
    compyz              = VALUE(FLOAT, "yz component of inertia tensor");
    compzz              = VALUE(FLOAT, "zz component of inertia tensor");
    HMCOMP_TITLE        = VALUE(STRING, "HM Component name ");
    HMCOMP_ID           = VALUE(INT, "HM Component id ");
    SUBGRP_ADINERTIA_NON_UNIFORM     =   VALUE(SUBOBJECT, ""); 
}

SKEYWORDS_IDENTIFIER(COMMON)
{
    IO_FLAG                     = -1;
    _HMCOMMENTSFLAG             = -1;
    _HWCOLOR                    = -1;
    setid_type                  = -1;
    HMCOMP_TITLE                = 5438;
    HMCOMP_ID                   = 5437;
    SUBGRP_ADINERTIA_NON_UNIFORM    = -1;
}

DEFAULTS(COMMON) 
{
  setid_type = "/SETS/GRNOD";
}

DEFINITIONS(COMMON) {
  IMPORT_PREDATA_TABULAR=(type, setid);
} 

GUI(COMMON) {
mandatory:
    graphical SCALAR(masses) { DIMENSION="m"; }
    graphical SCALAR(compxx) { DIMENSION="inertia"; }
    graphical SCALAR(compxy) { DIMENSION="inertia"; }
    graphical SCALAR(compxz) { DIMENSION="inertia"; }
    graphical SCALAR(compyy) { DIMENSION="inertia"; }
    graphical SCALAR(compyz) { DIMENSION="inertia"; }
    graphical SCALAR(compzz) { DIMENSION="inertia"; }

    if(type == 5)
    {
        SUBOBJECT(SUBGRP_ADINERTIA_NON_UNIFORM) {SUBTYPES = (/SUBOBJECT/ADINERTIA_NON_UNIFORM);}
    }
}


FORMAT(radioss2612) {

    ASSIGN(IO_FLAG, 1, IMPORT);
    ASSIGN(IO_FLAG, 2, EXPORT);

    HEADER("/ADINERTIA/%d", _ID_);

    if(IO_FLAG == 1 && type == 0)
    {
        ASSIGN(setid_type, /SETS/GRNOD, IMPORT); 
        ASSIGN(setid, 0, IMPORT); 
    }

    CARD("%-100s", TITLE);

    if(IO_FLAG == 1) 
    {
        CARD_PREREAD("          %10d",type);
    }

    if(type == 0)
    {
        COMMENT("#  grnd_ID      type");
        CARD("%10d%10d",setid,type);
        COMMENT("#                IXX                 IXY                 IXZ                 IYY                 IYZ");
        CARD("%20lg%20lg%20lg%20lg%20lg", compxx, compxy, compxz, compyy, compyz);
        COMMENT("#                IZZ                Mass");
        CARD("%20lg%20lg",compzz, masses);
    }
    else if(type == 5)
    {
        SUBOBJECTS(SUBGRP_ADINERTIA_NON_UNIFORM,/SUBOBJECT/ADINERTIA_NON_UNIFORM);
    }
}
