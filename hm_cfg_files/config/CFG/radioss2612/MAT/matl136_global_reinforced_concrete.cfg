ATTRIBUTES(COMMON)
{
    KEYWORD_STR               = VALUE(STRING,"Solver Keyword");
    NUM_COMMENTS              = SIZE("NUM_COMMENTS");
    COMMENTS                  = ARRAY[NUM_COMMENTS](STRING,"Entity_Comments");
    CommentEnumField          = VALUE(INT,"User Comments");
    Mat_Name_OR_LawNo         = VALUE(INT,"");
    DUMMY                     = VALUE(STRING,"Dummy variable for Ref_Rho flag");
    TITLE                     = VALUE(STRING,"");
    IO_FLAG                   = VALUE(INT,"");
    LAW_NO                    = VALUE(STRING,""); 
    MAT_RHO                   = VALUE(FLOAT,"Initial Density");
    MAT_EC                    = VALUE(FLOAT,"Young's Modulus of concrete");
    MAT_NUC                   = VALUE(FLOAT,"Poisson Coeff. of concrete");
    MAT_ES                    = VALUE(FLOAT,"Young modulus of steel reinforcement");
    MAT_RHOS                  = VALUE(FLOAT,"Density of steel reinforcement");
    MAT_FT                    = VALUE(FLOAT,"Concrete Tensile Strength");
    MAT_FC                    = VALUE(FLOAT,"Concrete Compressive Strength");
    MAT_GAMMA                 = VALUE(FLOAT,"Damage parameter: ratio of the moment-curvature slope during concrete cracking over the elastic slope before cracking.");
    MAT_QP1                   = VALUE(FLOAT,"Slope quotient prior/after cracking in positive bending");
    MAT_QP2                   = VALUE(FLOAT,"Slope quotient prior/after cracking in negative bending");
    MAT_SIGY_INF              = VALUE(FLOAT,"Yield Strength of steel reinforcement in x direction for the lower layer of reinforcement");
    MAT_OMEGA_X_INF           = VALUE(FLOAT,"Area of the steel reinforcement in x direction for the lower layer of reinforcement");
    MAT_OMEGA_Y_INF           = VALUE(FLOAT,"Area of the steel reinforcement in y direction for the lower layer of reinforcement");
    MAT_RHO_X_INF             = VALUE(FLOAT,"Position through the thickness of the steel reinforcement in x direction for the lower layer of reinforcement");
    MAT_RHO_Y_INF             = VALUE(FLOAT,"Position through the thickness of the steel reinforcement in y direction for the lower layer of reinforcement");
    MAT_SIGY_SUP              = VALUE(FLOAT,"Yield Strength of steel reinforcement in x direction for the upper layer of reinforcement");
    MAT_OMEGA_X_SUP           = VALUE(FLOAT,"Area of the steel reinforcement in x direction for the upper layer of reinforcement");
    MAT_OMEGA_Y_SUP           = VALUE(FLOAT,"Area of the steel reinforcement in y direction for the upper layer of reinforcement");
    MAT_RHO_X_SUP             = VALUE(FLOAT,"Position through the thickness of the steel reinforcement in x direction for the upper layer of reinforcement");
    MAT_RHO_Y_SUP             = VALUE(FLOAT,"Position through the thickness of the steel reinforcement in y direction for the upper layer of reinforcement");
    MAT_CM                    = VALUE(FLOAT,"Prager kinematic hardening coefficient for membrane forces");
    MAT_CB                    = VALUE(FLOAT,"Prager kinematic hardening coefficient for bending moments");
    
    Heat_Inp_opt              = VALUE(INT,"Heat");  
    SUBGRP_HEAT_MAT           = VALUE(SUBOBJECT,"");
    THERM_STRESS              = VALUE(INT,"Therm Stress");
    SUBGRP_THERM_STRESS       = VALUE(SUBOBJECT,"");
}

SKEYWORDS_IDENTIFIER(COMMON)
{
    KEYWORD_STR               = 9000;
    NUM_COMMENTS              = 5110;
    COMMENTS                  = 5109;
    CommentEnumField          = 7951;
    Mat_Name_OR_LawNo         = 4538;
    DUMMY                     = -1;
    LAW_NO                    = -1;
    IO_FLAG                   = -1;
    TITLE                     = -1;
    Heat_Inp_opt              = 4346;
    SUBGRP_HEAT_MAT           = -1;
    THERM_STRESS              = 4555;
    SUBGRP_THERM_STRESS       = -1;
    MAT_RHO                   =118;
    MAT_EC                    =119;
    MAT_NUC                   =120;
    MAT_ES                    =-1;
    MAT_RHOS                  =-1;
    MAT_FT                    =-1;
    MAT_FC                    =-1;
    MAT_GAMMA                 =-1;
    MAT_QP1                   =-1;
    MAT_QP2                   =-1;
    MAT_SIGY_INF              =-1;
    MAT_OMEGA_X_INF           =-1;
    MAT_OMEGA_Y_INF           =-1;
    MAT_RHO_X_INF             =-1;
    MAT_RHO_Y_INF             =-1;
    MAT_SIGY_SUP              =-1;
    MAT_OMEGA_X_SUP           =-1;
    MAT_OMEGA_Y_SUP           =-1;
    MAT_RHO_X_SUP             =-1;
    MAT_RHO_Y_SUP             =-1;
    MAT_CM                    =-1;
    MAT_CB                    =-1;
}
DRAWABLES(COMMON) {
public:
    INITIAL_DENSITY = SCALAR(MAT_RHO);
    YOUNG_MODULUS = SCALAR(MAT_EC);
    POISSON_RATIO = SCALAR(MAT_NUC);
public:
    SOUND_SPEED = EVAL((YOUNG_MODULUS/INITIAL_DENSITY)^0.5);
private:
    G = EVAL(YOUNG_MODULUS/(2*(1+POISSON_RATIO)));
    C1 = EVAL(YOUNG_MODULUS/(3*(1-2*POISSON_RATIO)));
public:
    SOUND_SPEED_SOLID = EVAL(((4*G/3+C1)/INITIAL_DENSITY)^0.5);
}

CHECK
{
    MAT_NUC >=0.0;
    MAT_NUC <0.5;
}

DEFAULTS(COMMON)
{
    Mat_Name_OR_LawNo         = 0;
}

GUI(COMMON)
{
    RADIO(CommentEnumField)
    {
        ENUM_VALUE_FLAG=TRUE;
        ADD(1,"Hide in Menu/Export");
        ADD(2,"Show in Menu/Export");
        ADD(3,"Do Not Export");
    }
    if(CommentEnumField == 2)
    {
        SIZE(NUM_COMMENTS);
        ARRAY(NUM_COMMENTS,"")
        {
            SCALAR(COMMENTS);
        }
    }
    if( Mat_Name_OR_LawNo == 1)
    {
        ASSIGN(KEYWORD_STR, "/MAT");
        ASSIGN(KEYWORD_STR, "/GLOBAL_REINFORCED_CONCRETE/");
    }
    else
    {
        ASSIGN(KEYWORD_STR, "/MAT");
        ASSIGN(KEYWORD_STR, "/LAW136/");
    }
    SCALAR(MAT_RHO)           { DIMENSION="density";       } 
    SCALAR(MAT_EC)            { DIMENSION="pressure";      }
    SCALAR(MAT_NUC)           { DIMENSION="DIMENSIONLESS"; }
    SCALAR(MAT_ES)            { DIMENSION="pressure";      }
    SCALAR(MAT_RHOS)          { DIMENSION="density";       }
    SCALAR(MAT_FT)            { DIMENSION="pressure";      }
    SCALAR(MAT_FC)            { DIMENSION="pressure";      }
    SCALAR(MAT_QP1)           { DIMENSION="DIMENSIONLESS"; }
    SCALAR(MAT_QP2)           { DIMENSION="DIMENSIONLESS"; }
    SCALAR(MAT_GAMMA)         { DIMENSION="DIMENSIONLESS"; }
    SCALAR(MAT_SIGY_INF)      { DIMENSION="pressure";      }
    SCALAR(MAT_OMEGA_X_INF)   { DIMENSION="DIMENSIONLESS"; }
    SCALAR(MAT_OMEGA_Y_INF)   { DIMENSION="DIMENSIONLESS"; }
    SCALAR(MAT_RHO_X_INF)     { DIMENSION="DIMENSIONLESS"; }
    SCALAR(MAT_RHO_Y_INF)     { DIMENSION="DIMENSIONLESS"; }
    SCALAR(MAT_SIGY_SUP)      { DIMENSION="pressure";      }
    SCALAR(MAT_OMEGA_X_SUP)   { DIMENSION="DIMENSIONLESS"; }
    SCALAR(MAT_OMEGA_Y_SUP)   { DIMENSION="DIMENSIONLESS"; }
    SCALAR(MAT_RHO_X_SUP)     { DIMENSION="DIMENSIONLESS"; }
    SCALAR(MAT_RHO_Y_SUP)     { DIMENSION="DIMENSIONLESS"; }
    SCALAR(MAT_CM)            { DIMENSION="pressure";      }
    SCALAR(MAT_CB)            { DIMENSION="pressure";      }
    graphical FLAG(Heat_Inp_opt);
    if (Heat_Inp_opt!= 0)
    {
        SUBOBJECT(SUBGRP_HEAT_MAT) {SUBTYPES = (/SUBOBJECT/HEAT);}
    }

    graphical FLAG(THERM_STRESS);
    if (THERM_STRESS!= 0) 
    {
        SUBOBJECT(SUBGRP_THERM_STRESS) {SUBTYPES = (/SUBOBJECT/THERM_STRESS);}  
    }
}

FORMAT(radioss2612)
{
    ASSIGN(IO_FLAG, 0, EXPORT);
    ASSIGN(IO_FLAG, 1,IMPORT);
    if(IO_FLAG == 1)
    {
        HEADER("/MAT/26%s",LAW_NO);
        if(LAW_NO == "GLOBAL_REINFORCED_CONCRETE" )
        {
            ASSIGN(Mat_Name_OR_LawNo,1);
        }
    }
    else if(IO_FLAG == 0 && Mat_Name_OR_LawNo == 1)
    {
        HEADER("/MAT/GLOBAL_REINFORCED_CONCRETE/%d",_ID_);
        CARD("%-100s", TITLE);
    }
    else
    {
        HEADER("/MAT/LAW136/%d",_ID_);
        CARD("%-100s", TITLE);
    }
    COMMENT("#              RHO_I");
    CARD("%20lg",MAT_RHO);
    COMMENT("#                 EC                 NUC                  ES                RHOS");
    CARD("%20lg%20lg%20lg%20lg",MAT_EC,MAT_NUC,MAT_ES,MAT_RHOS);
    COMMENT("#                 FT                  FC               GAMMA                 QP1                 QP2");
    CARD("%20lg%20lg%20lg%20lg%20lg",MAT_FT,MAT_FC,MAT_GAMMA,MAT_QP1,MAT_QP2);
    COMMENT("#           SIGY_INF         OMEGA_X_INF         OMEGA_Y_INF            RHOX_INF            RHOY_INF");
    CARD("%20lg%20lg%20lg%20lg%20lg",MAT_SIGY_INF,MAT_OMEGA_X_INF,MAT_OMEGA_Y_INF,MAT_RHO_X_INF,MAT_RHO_Y_INF);
    COMMENT("#           SIGY_SUP         OMEGA_X_SUP         OMEGA_Y_SUP            RHOX_SUP            RHOY_SUP");
    CARD("%20lg%20lg%20lg%20lg%20lg",MAT_SIGY_SUP,MAT_OMEGA_X_SUP,MAT_OMEGA_Y_SUP,MAT_RHO_X_SUP,MAT_RHO_Y_SUP);
    COMMENT("#                 CM                  CB");
    CARD("%20lg%20lg",MAT_CM,MAT_CB);
    if(Heat_Inp_opt!=0)
    {
        SUBOBJECTS(SUBGRP_HEAT_MAT,/SUBOBJECT/HEAT,_ID_);
    } 
    if(Heat_Inp_opt!=0 && THERM_STRESS !=0)
    {
        SUBOBJECTS(SUBGRP_THERM_STRESS,/SUBOBJECT/THERM_STRESS,_ID_);
    }
}

