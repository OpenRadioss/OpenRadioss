// Material law 105 (POWDER_BURN) Setup File
//
//This law describes the Powder-Burn material model

ATTRIBUTES(COMMON) {
    // Support
    // NB_PARTS                     = SIZE("Number of Connected Parts");
    //COMPONENT                     = ARRAY[NB_PARTS](COMPONENT,"Connected Parts");
    KEYWORD_STR                     = VALUE(STRING, "Solver Keyword");
    NUM_COMMENTS                    = SIZE("NUM_COMMENTS");
    CommentEnumField                = VALUE(INT,"User Comments");
    COMMENTS                        = ARRAY[NUM_COMMENTS](STRING,"Entity Comments");
    DUMMY                           = VALUE(STRING,"Dummy variable for Ref_Rho flag");
    TITLE                           = VALUE(STRING,"");
    IO_FLAG                         = VALUE(INT, "");
    Mat_Name_OR_LawNo               = VALUE(INT,  "RADIOSS_COMMENT_FLAG");
    LAW_NO                          = VALUE(STRING, "");

    //material parameters
    MAT_RHO                         = VALUE(FLOAT,"Powder Reference Density");
    MAT_NU                          = VALUE(FLOAT,"Poisson's ratio");
    MAT_PMIN                        = VALUE(FLOAT,"Minimum Pressure");
    MAT_C1                          = VALUE(FLOAT,"Burnt front velocity parameter (mandatory)");
    GAS_D                           = VALUE(FLOAT,"Gas parameter for equation of state ");
    GAS_RHOE                        = VALUE(FLOAT,"Volumetric specific energy parameter (rho.e)");
    POWDER_Gr                       = VALUE(FLOAT,"Reaction growth parameter");
    POWDER_C                        = VALUE(FLOAT,"Reaction growth ratio exponent");
    POWDER_ALPHA                    = VALUE(FLOAT,"Reaction growth ratio factor");
    FCT_ID_B                        = VALUE(FUNCT,"Function identifier for burn rate versus pressure");
    FCT_ID_G                        = VALUE(FUNCT,"Function identifier for shear modulus versus density");
    FCT_ID_Y                        = VALUE(FUNCT,"Function identifier for Yield strength versus pressure");
    XSCALE_G                        = VALUE(FLOAT,"Abscissa scale factor for fct_ID_G");
    XSCALE_Y                        = VALUE(FLOAT,"Abscissa scale factor for fct_ID_Y");
    XSCALE_B                        = VALUE(FLOAT,"Abscissa scale factor for fct_ID_b");
    YSCALE_Y                        = VALUE(FLOAT,"Yield strength scale factor for fct_ID_Y");
    YSCALE_G                        = VALUE(FLOAT,"Shear modulus scale factor for fct_ID_G");
    YSCALE_B                        = VALUE(FLOAT,"Burn rate scale factor for fct_ID_b");
}

SKEYWORDS_IDENTIFIER(COMMON)
{
    KEYWORD_STR                     = 9000;
    COMMENTS                        = 5109;
    CommentEnumField                = 7951;
    NUM_COMMENTS                    = 5110;
}

DEFAULTS(COMMON) {
    GAS_D            = 0.0 ;
    GAS_RHOE         = 0.0 ;
    POWDER_Gr        = 0.0 ;
    POWDER_C         = 0.0 ;
    POWDER_ALPHA     = 0.0 ;
    MAT_C1           = 0.0 ;
    XSCALE_G         = 1.0 ;
    XSCALE_Y         = 1.0 ;
    XSCALE_B         = 1.0 ;
    YSCALE_Y         = 1.0 ;
    YSCALE_G         = 1.0 ;
    YSCALE_B         = 1.0 ;
}

GUI(COMMON)
{
    RADIO(CommentEnumField)
    {
        ENUM_VALUE_FLAG=TRUE;
        ADD(1, "Hide in Menu/Export");
        ADD(2, "Show in Menu/Export");
        ADD(3, "Do Not Export");
    }
    if( CommentEnumField == 2 )
    {
        SIZE(NUM_COMMENTS);
        ARRAY(NUM_COMMENTS,"")
        {
            SCALAR(COMMENTS);
        }
    }
    if(Mat_Name_OR_LawNo == 2)
    {
        ASSIGN(KEYWORD_STR, "/MAT");
        ASSIGN(KEYWORD_STR, "/LAW105/");
    }
    else
    {
        ASSIGN(KEYWORD_STR, "/MAT");
        ASSIGN(KEYWORD_STR, "/POWDER_BURN/");
    }

    mandatory:
    SCALAR(MAT_RHO)          { DIMENSION="density";       }
    SCALAR(MAT_NU)           { DIMENSION="DIMENSIONLESS"; }
    SCALAR(MAT_PMIN)         { DIMENSION="pressure";      }
    SCALAR(GAS_D)            { DIMENSION="density"; }
    SCALAR(GAS_RHOE )        { DIMENSION="energydensity"; }
    SCALAR(POWDER_Gr)        { DIMENSION="inverse_of_length"; }
    SCALAR(POWDER_C)         { DIMENSION="DIMENSIONLESS"; }
    SCALAR(POWDER_ALPHA)     { DIMENSION="DIMENSIONLESS"; }
    SCALAR(MAT_C1)           { DIMENSION="velocity"; }

    optional:
    DATA(FCT_ID_G);
    mandatory:
    SCALAR(YSCALE_G)   { DIMENSION="pressure"; }
    optional:
    SCALAR(XSCALE_G)   { DIMENSION="density"; }

    optional:
    DATA(FCT_ID_Y);
    mandatory:
    SCALAR(YSCALE_Y)   { DIMENSION="pressure"; }
    optional:
    SCALAR(XSCALE_Y)   { DIMENSION="pressure"; }

    optional:
    DATA(FCT_ID_B);
    mandatory:
    SCALAR(YSCALE_B)   { DIMENSION="velocity"; }
    optional:
    SCALAR(XSCALE_B)   { DIMENSION="pressure"; }
}


//file format
FORMAT(radioss2612)
{
    ASSIGN(IO_FLAG, 0, EXPORT);
    ASSIGN(IO_FLAG, 1, IMPORT);
    if(IO_FLAG == 1)
    {
        HEADER("/MAT/%3s",LAW_NO);
        if(LAW_NO == "LAW" )
        {
            ASSIGN(Mat_Name_OR_LawNo,2);
        }
    }
    else if(IO_FLAG == 0 && Mat_Name_OR_LawNo == 2)
    {
        HEADER("/MAT/LAW105/%d",_ID_);
        CARD("%-100s", TITLE);
    }
    else
    {
        HEADER("/MAT/POWDER_BURN/%d",_ID_);
        CARD("%-100s", TITLE);
    }

    // POWDER MODEL :
    //---------------

    // powder reference density
    COMMENT("#                RHO");
    CARD("%20lg",MAT_RHO);
    COMMENT("#                 NU                PMIN                  C1");
    CARD("%20lg%20lg%20lg",MAT_NU,MAT_PMIN,MAT_C1);
    // Combustion parameters
    COMMENT("#                  D               rhoeg                 Gr                   C               alpha");
    CARD("%20lg%20lg%20lg%20lg%20lg",GAS_D,GAS_RHOE,POWDER_Gr,POWDER_C,POWDER_ALPHA);
    // shear modulus function
    COMMENT("# fct_ID_G                       G-scale            G-scaleX");
    CARD("%10d%10s%20lg%20lg",FCT_ID_G,_BLANK_,YSCALE_G,XSCALE_G);
    // Yield strength function
    COMMENT("# fct_ID_Y                       Y-scale           Y-scaleX");
    CARD("%10d%10s%20lg%20lg",FCT_ID_Y,_BLANK_,YSCALE_Y,XSCALE_Y);
    // burn rate function
    COMMENT("# fct_ID_b                       b-scale            b-scaleX");
    CARD("%10d          %20lg%20lg",FCT_ID_B,YSCALE_B,XSCALE_B);



}

