// /MAT/ELASTO_PLASTIC MAIN INPUT
// 

ATTRIBUTES(COMMON) {
  // Support
    MAT_RHO             =  VALUE(FLOAT ,"Initial Density");
    MAT_IRES            =  VALUE(INT   ,"Return Mapping Flag");
    TITLE               =  VALUE(STRING,"TITLE");
    LAW_NO              =  VALUE(STRING,"");
    Mat_Name_OR_LawNo   =  VALUE(INT,  "RADIOSS_COMMENT_FLAG");
    clausesmax          =  SIZE("Numbers of keys/items");    
    clauses             =  ARRAY[clausesmax](SUBOBJECT, "List of keys/items") {SUBTYPES=(/SUBOBJECT/MATL131_ELASTO_PLASTIC_SUPPORT);}
    KEYWORD_STR         =  VALUE(STRING, "Solver Keyword");
    NUM_COMMENTS        =  SIZE("NUM_COMMENTS");
    CommentEnumField    =  VALUE(INT,"User Comments");
    COMMENTS            =  ARRAY[NUM_COMMENTS](STRING,"Entity Comments");
    _HWCOLOR            =  VALUE(INT, "Entity Color");
// ----- CFG Local attribute
    IO_FLAG             =  VALUE(INT, "Import/Export flag");
    Optional_card       =  VALUE(INT, "Optional card");
}
SKEYWORDS_IDENTIFIER(COMMON)
{
    clausesmax=-1;
    clauses=-1;
    MAT_RHO=-1;
    MAT_IRES=-1;
    KEYWORD_STR                                 = 9000;
    CommentEnumField                            = 7951;
    NUM_COMMENTS                                = 5110;
    COMMENTS                                    = 5109;
    LAW_NO                                      = -1;
    Mat_Name_OR_LawNo                           = 4538;
    IO_FLAG                                     = -1;
    TITLE                                       = -1;
    Optional_card                               = 4826;
    _HWCOLOR=-1;
}

GUI(COMMON) {
    RADIO(CommentEnumField)
    {
        ENUM_VALUE_FLAG=TRUE;
        ADD(1, "Hide in Menu/Export");
        ADD(2, "Show in Menu/Export");
        ADD(3, "Do Not Export");
    }
    if (CommentEnumField == 2)
    {  
        SIZE(NUM_COMMENTS);
        ARRAY(NUM_COMMENTS,"")
        {
            SCALAR(COMMENTS);
        }   
    }
    if(Mat_Name_OR_LawNo == 2)
    {
        ASSIGN(KEYWORD_STR, "/MAT");
        ASSIGN(KEYWORD_STR, "/LAW131/");
    }
    else 
    {
        ASSIGN(KEYWORD_STR, "/MAT");
        ASSIGN(KEYWORD_STR, "/ELASTO_PLASTIC/");
    }

   SCALAR(MAT_RHO)         { DIMENSION="density";    }
   SIZE(clausesmax) ;
   ARRAY(clausesmax,"")
   {
        SUBOBJECT(clauses) {SUBTYPES = (/SUBOBJECT/MATL131_ELASTO_PLASTIC_SUPPORT);}     
   }  
}

FORMAT(radioss2612) {
    ASSIGN(IO_FLAG, 0,EXPORT);
    ASSIGN(IO_FLAG, 1,IMPORT);
    if(IO_FLAG == 1)
    {
        HEADER("/MAT/%3s",LAW_NO);
        if(LAW_NO == "LAW" )
        {
            ASSIGN(Mat_Name_OR_LawNo,2);
        }
    }
    else if(IO_FLAG == 0 && Mat_Name_OR_LawNo == 2)
    {
        HEADER("/MAT/LAW131/%d",_ID_);
        CARD("%-100s", TITLE);
    }
    else
    {
        HEADER("/MAT/ELASTO_PLASTIC/%d",_ID_);
        CARD("%-100s", TITLE);
    }
    COMMENT("#                RHO                IRES");
    CARD("%20lg%10s%10d",MAT_RHO,_BLANK_,MAT_IRES);
    SUBOBJECTS(clauses,/SUBOBJECT/MATL131_ELASTO_PLASTIC_SUPPORT);   
}