
// *INCLUDE_TANSFORM
ATTRIBUTES(COMMON)
{
    folderpath       = VALUE(STRING, "Folder Name");
    solverkeyword    = VALUE(STRING, "Solver Keyword");
    is_relative      = VALUE(INT, "Is relative path");
    
    filename_temp  = VALUE(STRING, "Temp");
    is_cont_card   = VALUE(INT, "");
    maxfileline_size      = SIZE("Max. File path lines");
}

DRAWABLES()
{
    _INCLUDE_FOLDERPATH   = SCALAR(folderpath);
}
DEFAULTS(COMMON)
{
   maxfileline_size = 3;
}
GUI(COMMON)
{
   ASSIGN(solverkeyword, *INCLUDE_PATH_RELATIVE);
   FILE(folderpath);  
}
FORMAT(Keyword971)
{
    ASSIGN(_IOMODE_, 1, IMPORT);
    ASSIGN(_IOMODE_, 2, EXPORT);
    HEADER("*INCLUDE_PATH%s", APPEND_OPTIONS([is_relative(1), "_RELATIVE"]));
    CARD("%-100s",folderpath);
    
    if(_IOMODE_ == 1)
    {
        ASSIGN(is_cont_card, 1, IMPORT);
        ASSIGN(maxfileline_size, 3, IMPORT);
        CARD_LIST(maxfileline_size)
        {
           if(is_cont_card == 1)
           {
              ASSIGN(is_cont_card, _FIND(folderpath, " +"));
              if(is_cont_card == 1)
              {
                 ASSIGN(folderpath, _ERASE(folderpath, "+"));
                 ASSIGN(folderpath, _ERASE(folderpath, " "));
                 CARD("%-100s",filename_temp);
                 ASSIGN(folderpath, _COMBINE(folderpath, filename_temp));
              }
           }
        }
    }
    
}